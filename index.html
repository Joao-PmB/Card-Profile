<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/f3941279ac.js" crossorigin="anonymous"></script>
    <title>Card-Profile</title>
</head>
<body>
    <div class="card">
        <div class="perfil">
            <div class="img"></div>
        </div>
        <div class="titulo">João Pedro</div>
        <div class="sobre">Desenvolvedor Front-end</div>
        <div class="redes-sociais-icones">
            <a href="#" target="_blank"><i class="fab fa-github"></i></a>
            <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="#" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="#" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <button class="contato">Contate-me</button>
    </div>
</body>
</html>
